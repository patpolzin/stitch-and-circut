<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>KnitBit Builder — character customization</title>
<style>
  :root { --bg:#191b1f; --panel:#22252b; --ink:#e8eaee; --muted:#9aa1ab; --line:#33373f;
          --accent:#38e655; --err:#ff5d5d; }
  * { box-sizing:border-box; margin:0; }
  body { display:flex; height:100vh; background:var(--bg); color:var(--ink);
         font:14px/1.45 system-ui,-apple-system,Segoe UI,sans-serif; overflow:hidden; }
  #stage { flex:1; position:relative; min-width:0; }
  #stage canvas { display:block; }
  #hud { position:absolute; left:14px; top:12px; color:var(--muted); font-size:12px; }
  #errbar { position:absolute; left:0; right:0; top:0; background:var(--err); color:#2a0606;
            font-weight:600; font-size:13px; padding:8px 14px; display:none; z-index:5; }
  #panel { width:380px; background:var(--panel); border-left:1px solid var(--line);
           display:flex; flex-direction:column; }
  #panelScroll { padding:16px 16px 20px; overflow-y:auto; flex:1; }
  h1 { font-size:18px; }
  .sub { color:var(--muted); font-size:12px; margin:2px 0 12px; }

  #profile { padding:10px 12px; border:1px solid var(--line); border-radius:12px;
             display:flex; gap:12px; align-items:center; margin-bottom:14px; }
  #avatar { width:60px; height:60px; border-radius:50%; background:#111; object-fit:cover;
            border:2px solid var(--line); }
  #profile .who { flex:1; min-width:0; }
  #profile .who b { display:block; font-size:13px; }
  #profile .who span { font-size:11px; color:var(--muted); }

  #tabs { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
  #tabs button { padding:6px 10px; font-size:12px; border:1px solid var(--line);
                 background:#1a1c21; color:var(--muted); border-radius:999px; cursor:pointer; }
  #tabs button.active { background:var(--accent); border-color:var(--accent);
                        color:#0b1409; font-weight:700; }

  #tiles { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
  .tile { position:relative; border:2px solid var(--line); border-radius:12px; overflow:hidden;
          cursor:pointer; background:#1a1c21; padding:0; }
  .tile img { display:block; width:100%; aspect-ratio:1; object-fit:cover; }
  .tile figcaption { font-size:10px; color:var(--muted); text-align:center; padding:3px 2px 5px; }
  .tile.selected { border-color:var(--accent); }
  .tile.selected figcaption { color:var(--accent); }

  .sect { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted);
          margin:4px 0 6px; }
  .swatches { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
  .sw { width:26px; height:26px; border-radius:50%; border:2px solid var(--line); cursor:pointer; }
  .sw.selected { border-color:#fff; box-shadow:0 0 0 2px var(--accent); }

  #anims { display:flex; gap:6px; margin-bottom:12px; }
  #anims button { flex:1; padding:7px 0; font-size:12px; border:1px solid var(--line);
                  background:#1a1c21; color:var(--ink); border-radius:8px; cursor:pointer; }
  #anims button.active { border-color:var(--accent); color:var(--accent); font-weight:700; }

  #pfpBtn { width:100%; padding:10px; border:0; border-radius:10px; background:var(--accent);
            color:#0b1409; font-weight:700; font-size:14px; cursor:pointer; }
  #pfpBtn:hover { filter:brightness(1.08); }
  a.dl { display:block; margin-top:6px; font-size:11px; color:var(--accent); }
  a.dl[hidden] { display:none; }
  #status { padding:8px 16px; font-size:11px; color:var(--muted); border-top:1px solid var(--line);
            min-height:31px; }
</style>
</head>
<body>
<div id="stage">
  <div id="errbar"></div>
  <div id="hud">drag to orbit · scroll to zoom</div>
</div>
<div id="panel">
  <div id="panelScroll">
    <h1>KnitBit Builder</h1>
    <div class="sub">Customize your Bit — live 3D preview with idle motion.</div>
    <div id="profile">
      <img id="avatar" alt="profile picture">
      <div class="who"><b>your_profile</b><span id="avatarState">no picture yet</span></div>
    </div>
    <div id="tabs"></div>
    <div id="tiles"></div>
    <div class="sect" id="yarnSect" hidden>Yarn color</div>
    <div class="swatches" id="yarnSw" hidden></div>
    <div class="sect">Accent color <span id="accentSlot" style="text-transform:none"></span></div>
    <div class="swatches" id="accentSw"></div>
    <div class="sect">Animation</div>
    <div id="anims"></div>
    <button id="pfpBtn">📸 Save look &amp; take profile picture</button>
    <a class="dl" id="pfpDl" hidden download="knitbit_pfp.png">download profile picture</a>
  </div>
  <div id="status">loading…</div>
</div>

<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from './vendor/GLTFLoader.js';
import { OrbitControls } from './vendor/OrbitControls.js';

const WEB = '../assets/3d/knitbit_base/web/';
const stage = document.getElementById('stage');
const statusEl = document.getElementById('status');
const errbar = document.getElementById('errbar');
const say = m => statusEl.textContent = m;
const fail = m => { errbar.style.display = 'block';
                    errbar.textContent = '⚠ ' + m; console.error('[builder]', m); };

// test/debug hooks (Playwright asserts against these)
window.__KB = { ready:false, equips:0, pfp:false, failures:[], debug:null };
const recordFail = m => { window.__KB.failures.push(m); fail(m); };

if (location.protocol === 'file:') {
  fail('This editor must be served over http:// (module scripts + asset fetches are blocked ' +
       'on file://). From the repo root run:  python3 -m http.server   then open ' +
       'http://localhost:8000/demos/knitbit_builder.html');
  throw new Error('file:// not supported');
}

const renderer = new THREE.WebGLRenderer({ antialias:true, preserveDrawingBuffer:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.35;
stage.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x191b1f);
const camera = new THREE.PerspectiveCamera(33, 1, 0.05, 60);
const controls = new OrbitControls(camera, renderer.domElement);

// keep lights in variables — scene.add() returns the SCENE; chaining
// .position.set off it once translated the whole world (found via E2E)
scene.add(new THREE.HemisphereLight(0xe6ecf4, 0x3a3f48, 1.6));
const key = new THREE.DirectionalLight(0xffffff, 3.0);
key.position.set(2.4, 3.5, 2.8);
scene.add(key);
const fill = new THREE.DirectionalLight(0xaebbd0, 1.1);
fill.position.set(-3, 1, -2);
scene.add(fill);
const front = new THREE.DirectionalLight(0xffffff, 0.9);
front.position.set(0, 0.6, 5);
scene.add(front);

function resize() {
  const w = stage.clientWidth, h = stage.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize);

const loader = new GLTFLoader();
const loadGLB = url => new Promise((ok, err) => loader.load(url, ok, undefined, err));

let manifest;
try {
  manifest = await (await fetch(WEB + 'manifest.web.json')).json();
} catch (e) {
  fail('Could not load ' + WEB + 'manifest.web.json — is the server running at the repo root?');
  throw e;
}
const H = manifest.base.char_height;
camera.position.set(1.7, H * 0.26, 4.1);
controls.target.set(0, 0, 0);
resize();

// soft fake ground shadow (radial gradient disc) so the character reads grounded
{
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(128, 128, 10, 128, 128, 128);
  grad.addColorStop(0, 'rgba(0,0,0,0.45)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = grad; g.fillRect(0, 0, 256, 256);
  const tex = new THREE.CanvasTexture(c);
  const disc = new THREE.Mesh(new THREE.CircleGeometry(1.15, 48),
                              new THREE.MeshBasicMaterial({ map:tex, transparent:true,
                                                            depthWrite:false }));
  disc.rotation.x = -Math.PI / 2;
  disc.position.y = -H / 2 + 0.005;
  scene.add(disc);
}

// ---------- base character ----------
const baseGltf = await loadGLB(WEB + manifest.base.file).catch(e => {
  fail('Failed to load base.glb: ' + e.message); throw e;
});
scene.add(baseGltf.scene);
baseGltf.scene.updateMatrixWorld(true);

const bones = {}, parts = {}, boneRestInv = {};
baseGltf.scene.traverse(o => {
  if (o.isBone) bones[o.name] = o;
  if (manifest.base.parts.includes(o.name)) parts[o.name] = o;
});
for (const [n, b] of Object.entries(bones))
  boneRestInv[n] = b.matrixWorld.clone().invert();

// GLTFLoader SANITIZES node names (PropertyBinding.sanitizeNodeName strips
// '.' among others), so the manifest's "Foot.L" is "FootL" in the loaded
// skeleton. This exact mismatch silently dropped boots+hands in v1 (the base
// parts were hidden, the pieces never attached — footless character).
const findBone = name => {
  if (!name) return null;
  return bones[name] || bones[THREE.PropertyBinding.sanitizeNodeName(name)] || null;
};

// base (yarn) materials — for colorway swaps
const baseMats = new Set();
Object.values(parts).forEach(p => p.traverse(o => { if (o.isMesh) baseMats.add(o.material); }));
const baseOrigMaps = new Map([...baseMats].map(m => [m, m.map]));

const mixer = new THREE.AnimationMixer(baseGltf.scene);
const clips = baseGltf.animations || [];
let activeAction = null;
function playClip(name) {
  const clip = clips.find(c => c.name.includes(name)) || clips[0];
  if (!clip) return;
  const action = mixer.clipAction(clip);
  if (activeAction && activeAction !== action) activeAction.fadeOut(0.25);
  action.reset().fadeIn(0.25).setLoop(THREE.LoopRepeat).play();
  activeAction = action;
  document.querySelectorAll('#anims button').forEach(b =>
    b.classList.toggle('active', b.dataset.clip === name));
}

// ---------- trait equipping ----------
const gltfCache = {};
const equipped = {};     // slot -> {meshes:[], hides:[], pend:null, mats:[]}
const traitById = Object.fromEntries(manifest.traits.map(t => [t.id, t]));
const selection = {};    // slot -> traitId|null  (drives tiles + accent UI)
const accentBySlot = {}; // slot -> hex|null

function attachRestWorld(object3d, bone, restWorld) {
  const local = boneRestInv[bone.name].clone().multiply(restWorld);
  bone.add(object3d);
  local.decompose(object3d.position, object3d.quaternion, object3d.scale);
}

async function equip(slot, traitId) {
  const prev = equipped[slot];
  if (prev) {
    prev.meshes.forEach(m => m.parent?.remove(m));
    prev.hides.forEach(p => { if (parts[p]) parts[p].visible = true; });
    delete equipped[slot];
  }
  selection[slot] = traitId || null;
  if (!traitId) { window.__KB.equips++; refreshTiles(); return; }
  const t = traitById[traitId];
  let gltf;
  try {
    gltfCache[traitId] ??= loadGLB(WEB + t.file);
    gltf = await gltfCache[traitId];
  } catch (e) {
    delete gltfCache[traitId];
    recordFail(`Failed to load piece for "${t.label}" (${t.file}): ${e.message}`);
    window.__KB.equips++; refreshTiles(); return;
  }
  const entry = { meshes: [], hides: t.hides || [], pend: null, mats: [] };
  const dyn = manifest.slots[slot]?.dynamic;

  for (const att of t.attachments) {
    const src = gltf.scene.getObjectByName(att.node) ||
                gltf.scene.getObjectByName(THREE.PropertyBinding.sanitizeNodeName(att.node));
    const bone = findBone(att.bone);
    if (!src) { recordFail(`Piece node "${att.node}" missing in ${t.file}`); continue; }
    if (!bone) { recordFail(`Bone "${att.bone}" not found for ${t.label}`); continue; }
    const mesh = src.clone(true);
    // give each equipped piece its own material so accent tints don't leak
    mesh.traverse(o => { if (o.isMesh) { o.material = o.material.clone(); entry.mats.push(o.material); } });
    scene.add(mesh);
    mesh.updateMatrixWorld(true);
    const restWorld = mesh.matrixWorld.clone();
    scene.remove(mesh);

    if (dyn && src.userData.knitbit_pivot_pos) {
      const p = src.userData.knitbit_pivot_pos;           // Blender Z-up
      const hook = new THREE.Vector3(p[0], p[2], -p[1]);  // -> glTF Y-up
      const pivot = new THREE.Group();
      const pivotWorld = new THREE.Matrix4().setPosition(hook);
      attachRestWorld(pivot, bone, pivotWorld);
      const rel = pivotWorld.clone().invert().multiply(restWorld);
      pivot.add(mesh);
      rel.decompose(mesh.position, mesh.quaternion, mesh.scale);
      entry.pend = { pivot, angle: 0, vel: 0,
                     stiffness: dyn.stiffness ?? 0.12, damping: dyn.damping ?? 0.85,
                     maxA: THREE.MathUtils.degToRad(dyn.max_angle_deg ?? 22) };
      entry.meshes.push(pivot);
    } else {
      attachRestWorld(mesh, bone, restWorld);
      entry.meshes.push(mesh);
    }
  }
  // hide base parts ONLY if the replacement actually attached — a failed boot
  // load must never leave the character footless (v1 did exactly that)
  if (entry.meshes.length > 0) {
    entry.hides.forEach(p => { if (parts[p]) parts[p].visible = false; });
    equipped[slot] = entry;
    if (accentBySlot[slot]) applyAccent(slot, accentBySlot[slot]);
  } else if ((t.attachments || []).length > 0) {
    recordFail(`"${t.label}" attached 0 of ${t.attachments.length} pieces — base left visible`);
  }
  window.__KB.equips++;
  refreshTiles();
}

// ---------- colors ----------
const texLoader = new THREE.TextureLoader();
const colorwayTex = {};
function applyYarn(cw) {
  document.querySelectorAll('#yarnSw .sw').forEach(el =>
    el.classList.toggle('selected', el.dataset.id === (cw ? cw.id : 'default')));
  if (!cw || !cw.file) {   // default: restore original baked texture
    for (const [m, map] of baseOrigMaps) { m.map = map; m.needsUpdate = true; }
    return;
  }
  colorwayTex[cw.id] ??= new Promise(res => texLoader.load(WEB + cw.file, tex => {
    tex.flipY = false;                       // glTF UV convention
    tex.colorSpace = THREE.SRGBColorSpace;
    res(tex);
  }, undefined, () => { recordFail('Failed to load colorway ' + cw.file); res(null); }));
  colorwayTex[cw.id].then(tex => {
    if (!tex) return;
    for (const m of baseMats) { m.map = tex; m.needsUpdate = true; }
  });
}

function applyAccent(slot, hex) {
  accentBySlot[slot] = hex;
  const entry = equipped[slot];
  if (entry) entry.mats.forEach(m => m.color.set(hex || '#ffffff'));
  document.querySelectorAll('#accentSw .sw').forEach(el =>
    el.classList.toggle('selected', el.dataset.hex === (hex || '')));
}

// ---------- UI ----------
const tabsEl = document.getElementById('tabs');
const tilesEl = document.getElementById('tiles');
const slotOrder = Object.keys(manifest.slots);
let activeSlot = slotOrder[0];

function renderTabs() {
  tabsEl.innerHTML = '';
  for (const slot of slotOrder) {
    const b = document.createElement('button');
    b.textContent = manifest.slots[slot].label;
    b.classList.toggle('active', slot === activeSlot);
    b.onclick = () => { activeSlot = slot; renderTabs(); renderTiles(); renderAccent(); };
    tabsEl.appendChild(b);
  }
}

function tile(imgSrc, label, selected, onclick) {
  const fig = document.createElement('button');
  fig.className = 'tile' + (selected ? ' selected' : '');
  fig.innerHTML = `<img src="${imgSrc}" alt=""><figcaption>${label}</figcaption>`;
  fig.onclick = onclick;
  return fig;
}

function renderTiles() {
  tilesEl.innerHTML = '';
  const cur = selection[activeSlot] || null;
  tilesEl.appendChild(tile(WEB + 'tiles/none.jpg', 'None', cur === null, async () => {
    say('removing…'); await equip(activeSlot, null); say('ready');
  }));
  for (const t of manifest.traits.filter(t => t.slot === activeSlot)) {
    tilesEl.appendChild(tile(WEB + `tiles/${t.id}.jpg`, t.label, cur === t.id, async () => {
      say('equipping ' + t.label + '…'); await equip(activeSlot, t.id); say('ready');
    }));
  }
}
const refreshTiles = () => { renderTiles(); };

function renderAccent() {
  document.getElementById('accentSlot').textContent =
    '· ' + manifest.slots[activeSlot].label;
  const row = document.getElementById('accentSw');
  row.innerHTML = '';
  const none = document.createElement('div');
  none.className = 'sw'; none.dataset.hex = '';
  none.style.background =
    'linear-gradient(135deg,#fff 45%,#f33 45%,#f33 55%,#fff 55%)';
  none.title = 'no tint';
  none.onclick = () => applyAccent(activeSlot, null);
  row.appendChild(none);
  for (const [id, th] of Object.entries(manifest.themes || {})) {
    const el = document.createElement('div');
    el.className = 'sw'; el.dataset.hex = th.accent;
    el.style.background = th.accent;
    el.title = th.label;
    el.onclick = () => applyAccent(activeSlot, th.accent);
    row.appendChild(el);
  }
  applyAccent(activeSlot, accentBySlot[activeSlot] ?? null);
}

function renderYarn() {
  const cws = manifest.colorways || [];
  if (!cws.length) return;
  document.getElementById('yarnSect').hidden = false;
  const row = document.getElementById('yarnSw');
  row.hidden = false;
  row.innerHTML = '';
  for (const cw of cws) {
    const el = document.createElement('div');
    el.className = 'sw'; el.dataset.id = cw.id;
    el.style.background = cw.hex;
    el.title = cw.label;
    el.onclick = () => applyYarn(cw.file ? cw : null);
    row.appendChild(el);
  }
  applyYarn(null);
}

function renderAnims() {
  const row = document.getElementById('anims');
  row.innerHTML = '';
  const names = clips.length ? clips.map(c => c.name) : [];
  const wanted = ['Idle', 'Wave', 'Bounce'].filter(w => names.some(n => n.includes(w)));
  for (const w of (wanted.length ? wanted : names.slice(0, 3))) {
    const b = document.createElement('button');
    b.textContent = w; b.dataset.clip = w;
    b.onclick = () => playClip(w);
    row.appendChild(b);
  }
}

renderTabs(); renderTiles(); renderAccent(); renderYarn(); renderAnims();
playClip('Idle');

// start from the pilot preset
for (const [slot, tid] of Object.entries(manifest.presets.pilot ?? {})) {
  await equip(slot, tid);
}

// ---------- profile picture (main renderer: a second WebGL context can't see
// this scene's GPU resources and captures an empty image) ----------
const pfpSize = 512;
const pfpCam = new THREE.OrthographicCamera(-H*0.36, H*0.36, H*0.36, -H*0.36, 0.05, 60);
document.getElementById('pfpBtn').onclick = () => {
  const aim = new THREE.Vector3(0, H * 0.30, 0);
  const a = THREE.MathUtils.degToRad(22);
  pfpCam.position.set(4 * Math.sin(a), aim.y, 4 * Math.cos(a));
  pfpCam.lookAt(aim);
  const prevPR = renderer.getPixelRatio();
  renderer.setPixelRatio(1);
  renderer.setSize(pfpSize, pfpSize, false);
  renderer.render(scene, pfpCam);
  const url = renderer.domElement.toDataURL('image/png');
  renderer.setPixelRatio(prevPR);
  resize();
  document.getElementById('avatar').src = url;
  document.getElementById('avatarState').textContent = 'profile picture applied ✓';
  const dl = document.getElementById('pfpDl');
  dl.href = url; dl.hidden = false;
  say('profile picture captured');
  window.__KB.pfp = true;
};

// ---------- animation loop ----------
const clock = new THREE.Clock();
const hips = findBone('Hips');
const hipsRestY = hips ? hips.position.y : 0;
let prevHipX = 0;

renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;
  mixer.update(dt);
  if (hips && activeAction?.getClip().name.includes('Idle')) {
    hips.position.y = hipsRestY + Math.sin(t * 2.4) * 0.008;
    hips.rotation.z += Math.sin(t * 1.1) * 0.012;
  }
  for (const e of Object.values(equipped)) {
    if (!e.pend) continue;
    const p = e.pend;
    const hipX = hips ? hips.rotation.z : 0;
    const drive = (hipX - prevHipX) * 40;
    p.vel += (-p.stiffness * 60 * p.angle - drive) * dt;
    p.vel *= Math.pow(p.damping, dt * 60);
    p.angle = THREE.MathUtils.clamp(p.angle + p.vel * dt, -p.maxA, p.maxA);
    p.pivot.rotation.x = p.angle;
    p.pivot.rotation.z = p.angle * 0.4;
  }
  prevHipX = hips ? hips.rotation.z : 0;
  controls.update();
  renderer.render(scene, camera);
});

// debug hook: world-space state of every equipped piece + base part visibility
window.__KB.debug = () => {
  const out = { pieces: [], parts: {} };
  const v = new THREE.Vector3();
  for (const [slot, e] of Object.entries(equipped)) {
    for (const m of e.meshes) {
      m.getWorldPosition(v);
      out.pieces.push({ slot, name: m.name, visible: m.visible,
                        pos: [+v.x.toFixed(3), +v.y.toFixed(3), +v.z.toFixed(3)] });
    }
  }
  for (const [n, p] of Object.entries(parts)) out.parts[n] = p.visible;
  return out;
};

say('ready');
window.__KB.ready = true;
</script>
</body>
</html>
