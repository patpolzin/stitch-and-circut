name: stitch_and_circuit
description: A physics puzzle-adventure game featuring Bit, a robot with knit wiring.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Game Engine
  flame: ^1.15.0
  flame_audio: ^2.1.0

  # State Management
  flutter_riverpod: ^2.4.9

  # Storage
  shared_preferences: ^2.2.2

  # Utilities
  vector_math: ^2.1.4
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/levels/

  fonts:
    - family: PixelFont
      fonts:
        - asset: assets/fonts/pixel_font.ttf
